<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สรุปรายงานสถิติการมาเรียน</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: "Sarabun", sans-serif; }
    .input {
      width:100%;
      border-radius:1rem;
      border:1px solid #ddd6fe;
      padding:.85rem 1rem;
      outline:none;
      background:white;
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-violet-100 via-purple-50 to-fuchsia-100 p-4">

<div class="max-w-4xl mx-auto bg-white/95 rounded-[2rem] shadow-xl p-6 md:p-8">

  <h1 class="text-3xl font-bold text-violet-800">
    สรุปรายงานสถิติการมาเรียน
  </h1>

  <p class="text-violet-500 mt-2 mb-6">
    เลือกวันที่เพื่อสร้างรายงาน PDF รายวัน 
  </p>

  <div class="grid md:grid-cols-2 gap-4 mb-5">
    <div>
      <label class="block mb-2 font-semibold text-violet-900">เลือกวันที่</label>
      <input type="date" id="reportDate" class="input">
    </div>
  </div>

  <div class="flex flex-col md:flex-row gap-3">
    <button
      onclick="generateReport()"
      class="bg-gradient-to-r from-violet-700 to-fuchsia-600 text-white px-6 py-3 rounded-2xl font-bold shadow">
      สร้างรายงาน PDF
    </button>

    <button
      onclick="window.open('index.html','_blank')"      class="bg-white border-2 border-violet-200 text-violet-700 px-6 py-3 rounded-2xl font-bold">
      กลับหน้าบันทึก
    </button>
  </div>

  <div id="result" class="mt-6 space-y-3"></div>
<footer class="text-center text-[12px] text-violet-400 mt-6 leading-6">
      © 2026 พัฒนาโดย นางสาวธาราธาร สุวรรณคาม | โรงเรียนรวมไทยพัฒนา 1 | สำนักงานเขตพื้นที่การศึกษาประถมศึกษาตาก เขต 2 
    </footer>
</div>

<script>

  const API_URL = "https://script.google.com/macros/s/AKfycbz6tYDGRcWSfKCdTVWMq5Rhr-fvLwHXsqQej73aUQOGPtIyzES9ngt7uWi054FLd3_p/exec";

  window.onload = function() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");
    const date = `${yyyy}-${mm}-${dd}`;

    document.getElementById("startDate").value = date;
    document.getElementById("endDate").value = date;
  };

  function generateReport() {

    const reportDate =
      document.getElementById("reportDate").value;

    if (!reportDate) {

      Swal.fire(
        "กรุณาเลือกวันที่",
        "",
        "warning"
      );

      return;

    }

    Swal.fire({
      title: "กำลังสร้างรายงาน...",
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading()
    });

    fetch(API_URL, {

      method: "POST",

      body: JSON.stringify({

        action: "generateAttendanceReportByDate",

        date: reportDate

      })

    })
    .then(res => res.json())

    .then(res => {

      if (!res.success) {
        throw new Error(res.message);
      }

      Swal.close();

      renderResult(res.data);

    })

    .catch(error => {

      Swal.fire(
        "เกิดข้อผิดพลาด",
        error.message,
        "error"
      );

    });

  }

  function renderResult(res) {
    const box = document.getElementById("result");

    if (!res.files || res.files.length === 0) {
      box.innerHTML = `<div class="p-4 bg-red-50 text-red-700 rounded-2xl">ไม่พบรายงาน</div>`;
      return;
    }

    box.innerHTML = `
      <div class="p-4 bg-green-50 text-green-700 rounded-2xl font-bold">
        สร้างรายงานสำเร็จ ${res.files.length} ไฟล์
      </div>
    `;

    res.files.forEach(file => {
      box.innerHTML += `
        <div class="p-4 bg-white border rounded-2xl flex justify-between items-center gap-3">
          <div>
            <div class="font-bold text-violet-800">${file.dateText}</div>
            <div class="text-sm text-gray-500">ร้อยละการมาเรียน ${file.percent}%</div>
          </div>
          <a href="${file.url}" target="_blank"
             class="bg-violet-700 text-white px-4 py-2 rounded-xl font-bold">
            เปิด PDF
          </a>
        </div>
      `;
    });
  }

  window.onload = function() {

    const today = new Date();

    const yyyy = today.getFullYear();

    const mm =
      String(today.getMonth() + 1)
        .padStart(2, "0");

    const dd =
      String(today.getDate())
        .padStart(2, "0");

    document.getElementById("reportDate").value =
      `${yyyy}-${mm}-${dd}`;

  };

</script>

</body>
</html>
